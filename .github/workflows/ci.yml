# Tokenfly Agent Team Lab — CI/CD Pipeline
# Eve (Infra Engineer) — 2026-03-29
#
# Runs on every push and PR to main.
# Stages: lint → e2e tests → docker build
#
# Secrets required (set in GitHub repo Settings → Secrets):
#   None for CI. For deploy stage: REGISTRY_TOKEN, DEPLOY_HOST (future).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  IMAGE_NAME: tokenfly

jobs:
  # ─────────────────────────────────────────────
  # Job 1: E2E Test Suite
  # Starts server.js, runs all Playwright tests.
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Docker Build
  # Validates the Dockerfile builds cleanly.
  # Does NOT push — no registry configured yet.
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agents/quinn/output/docker_setup/Dockerfile
          push: false
          load: true          # load into local daemon so we can docker run it
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts
        run: |
          docker run --rm -d \
            --name tokenfly-ci \
            -p 3100:3100 \
            -v "$(pwd)/agents:/app/agents" \
            -v "$(pwd)/public:/app/public" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Wait up to 20s for health
          for i in $(seq 1 10); do
            STATUS=$(docker exec tokenfly-ci wget -qO- http://localhost:3100/api/health 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "Server healthy after ${i}s"
              break
            fi
            sleep 2
          done
          docker stop tokenfly-ci

  # ─────────────────────────────────────────────
  # Job 3: Validate Infrastructure Configs
  # Lint docker-compose files, check shell scripts.
  # ─────────────────────────────────────────────
  validate-infra:
    name: Validate Infra Configs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose (main)
        run: |
          docker compose \
            -f agents/quinn/output/docker_setup/docker-compose.yml \
            config --quiet

      - name: Validate docker-compose (postgres standalone)
        run: |
          docker compose \
            -f agents/eve/output/docker-compose.postgres.yml \
            config --quiet

      - name: Check shell scripts are executable and parseable
        run: |
          for script in *.sh; do
            [ -f "$script" ] || continue
            bash -n "$script" && echo "OK: $script" || (echo "SYNTAX ERROR: $script" && exit 1)
          done
