# Tokenfly Agent Team Lab — Docker Compose
#
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # Tail logs
#   docker compose down           # Stop and remove container
#   docker compose build          # Rebuild image after source changes
#
# ENV vars (set in shell or .env file):
#   PORT              — dashboard port (default: 3199)
#   API_KEY           — optional API key for authenticated endpoints
#   TRUSTED_PROXIES   — comma-separated trusted proxy IPs/CIDRs

services:
  tokenfly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tokenfly-dashboard
    ports:
      - "${PORT:-3199}:3199"
    volumes:
      # Live agent state — mounted read-write so agents running on the host
      # can write status/inbox/output and the container sees it immediately.
      - ./agents:/app/agents
      # Shared data: task board, company mode, announcements, team directory
      - ./public:/app/public
      # Expose runtime logs to host for debugging (optional but useful)
      - /tmp/aicompany_runtime_logs:/tmp/aicompany_runtime_logs
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3199}"
      API_KEY: "${API_KEY:-}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3199/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
