version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: tokenfly-postgres
    environment:
      POSTGRES_USER: tokenfly
      POSTGRES_PASSWORD: tokenfly_dev
      POSTGRES_DB: tokenfly
    ports:
      - "5432:5432"
    volumes:
      # Persist data across container restarts
      - tokenfly_pgdata:/var/lib/postgresql/data
      # Auto-run Pat's schema migrations on first start (alphabetical order).
      # 01_ prefix ensures core schema runs before the incremental migrations.
      - ../../../../agents/pat/output/tokenfly_core_schema.sql:/docker-entrypoint-initdb.d/01_core_schema.sql:ro
      - ../../../../agents/pat/output/migration_002_add_request_metrics.sql:/docker-entrypoint-initdb.d/02_request_metrics.sql:ro
      - ../../../../agents/pat/output/migration_003_assignee_uuid_fk.sql:/docker-entrypoint-initdb.d/03_assignee_uuid_fk.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenfly -d tokenfly"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tokenfly:
    build:
      context: ../../../..         # aicompany/ root (where server.js lives)
      dockerfile: agents/quinn/output/docker_setup/Dockerfile
    image: tokenfly:latest
    container_name: tokenfly-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    volumes:
      # Agent state — all agent memory, inbox, output files live here.
      # Must be writable: agents update their own status.md files at runtime.
      - ../../../../agents:/app/agents

      # Shared config — task_board.md, company_mode.md, announcements, etc.
      # Must be writable: agents and the server update these files at runtime.
      - ../../../../public:/app/public
    environment:
      NODE_ENV: production
      # PostgreSQL connection — ready for when server.js integrates Pat's schema.
      # Dev credentials only; production secrets must use AWS Secrets Manager.
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: tokenfly
      PGPASSWORD: tokenfly_dev
      PGDATABASE: tokenfly
      DATABASE_URL: postgres://tokenfly:tokenfly_dev@postgres:5432/tokenfly
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  tokenfly_pgdata:
    driver: local
