openapi: "3.1.0"
info:
  title: Tokenfly Agent Team Lab — Dashboard API
  version: "1.0.0"
  description: |
    REST API for the Tokenfly Agent Team Lab dashboard.
    Provides access to agent status, task management, messaging, announcements,
    team channel, search, and CEO inbox.

    **Base URL:** `http://localhost:3100`

    **Rate Limits:**
    - Read endpoints: 120 requests/minute per IP
    - Write endpoints: 20 requests/minute per IP

  contact:
    name: Mia (API Engineer)

servers:
  - url: http://localhost:3100
    description: Local dev server
  - url: http://localhost:3199
    description: E2E test server

tags:
  - name: Health
    description: Server health and configuration
  - name: Agents
    description: Agent status, detail, and messaging
  - name: Tasks
    description: Task board CRUD
  - name: Announcements
    description: Company-wide announcements
  - name: Team Channel
    description: Team chat messages
  - name: Communication
    description: Broadcast and CEO inbox
  - name: Messaging
    description: Direct agent-to-agent messaging via inbox (backend/api.js)
  - name: Configuration
    description: Company mode and configuration management
  - name: Stats
    description: Cost tracking, metrics, and system health stats
  - name: Search
    description: Full-text search

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ---------- Health ----------
  /api/health:
    get:
      tags: [Health]
      summary: Server health check
      operationId: getHealth
      description: |
        Returns server health. The response shape depends on which handler
        responds first:
        - **backend/api.js** (mounted): `{ status: "ok", uptime_ms: number }`
        - **server.js** (standalone): `{ uptime, memory, activeAgents, sseClients }`
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HealthResponseBackend"
                  - $ref: "#/components/schemas/HealthResponse"
              examples:
                backend:
                  summary: backend/api.js response
                  value:
                    status: "ok"
                    uptime_ms: 3600000
                server:
                  summary: server.js response
                  value:
                    uptime: 3600
                    memory:
                      rss: 45678592
                      heapUsed: 18874368
                      heapTotal: 30408704
                    activeAgents: 3
                    sseClients: 1

  /api/config:
    get:
      tags: [Health]
      summary: Server configuration
      operationId: getConfig
      responses:
        "200":
          description: Server config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
              example:
                companyName: "Tokenfly Agent Team Lab"
                directory: "/path/to/aicompany"

  /api/dashboard:
    get:
      tags: [Health]
      summary: Unified dashboard data (agents + tasks + mode)
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  # ---------- Agents ----------
  /api/agents:
    get:
      tags: [Agents]
      summary: List all agents
      operationId: listAgents
      responses:
        "200":
          description: Array of agent summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"
              example:
                - name: alice
                  role: "Acting CEO / Tech Lead"
                  status: running
                  current_task: "Architecture review"
                  cycles: 12
                  last_update: "2026-03-29T22:00:00.000Z"
                  lastSeenSecs: 45
                  heartbeat_age_ms: 45000
                  auth_error: false
                  alive: true
                  unread_messages: 2

  /api/agents/start-all:
    post:
      tags: [Agents]
      summary: Start all agents
      operationId: startAllAgents
      responses:
        "200":
          description: All agents launch triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/stop-all:
    post:
      tags: [Agents]
      summary: Stop all agents
      operationId: stopAllAgents
      responses:
        "200":
          description: All agents stop triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/smart-start:
    post:
      tags: [Agents]
      summary: Run smart_run.sh to start the right agents
      operationId: smartStart
      responses:
        "200":
          description: Smart run launched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  decision:
                    type: object
                    additionalProperties:
                      type: string
                  message:
                    type: string

  /api/agents/watchdog:
    post:
      tags: [Agents]
      summary: Restart agents with stale heartbeat (>15 min)
      description: >
        Checks all running agents. If a loop is running but the heartbeat file
        is stale (older than 15 minutes), the agent is stopped and restarted.
      operationId: watchdog
      responses:
        "200":
          description: Watchdog check completed
          content:
            application/json:
              schema:
                type: object
                required: [ok, restarted, checked]
                properties:
                  ok:
                    type: boolean
                    example: true
                  restarted:
                    type: array
                    items:
                      type: string
                    description: Names of agents that were restarted
                    example: ["alice"]
                  checked:
                    type: integer
                    description: Total number of agents checked
                    example: 20
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        action:
                          type: string
                          enum: [restarted, ok, not_running]
                        heartbeat_age_ms:
                          type: integer
                          nullable: true

  /api/agents/{name}:
    get:
      tags: [Agents]
      summary: Get agent detail
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/message:
    post:
      tags: [Agents]
      summary: Send a direct message to an agent's inbox
      operationId: sendAgentMessage
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              message: "Please prioritize task 4 today"
              from: "ceo"
      responses:
        "200":
          description: Message delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
              example:
                ok: true
                filename: "2026_03_29_22_00_00_from_ceo.md"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/log:
    get:
      tags: [Agents]
      summary: Get agent raw log entries for today
      operationId: getAgentLog
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/ping:
    get:
      tags: [Agents]
      summary: Check if agent process is running
      operationId: pingAgent
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Process status
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  running:
                    type: boolean
                  inCycle:
                    type: boolean
                  pids:
                    type: array
                    items:
                      type: string

  /api/agents/{name}/start:
    post:
      tags: [Agents]
      summary: Start an individual agent
      operationId: startAgent
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent started or already running
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  already_running:
                    type: boolean
                  message:
                    type: string

  /api/agents/{name}/stop:
    post:
      tags: [Agents]
      summary: Stop an individual agent
      operationId: stopAgent
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Stop result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  output:
                    type: string

  /api/agents/{name}/status:
    get:
      tags: [Agents]
      summary: Get agent status.md content
      operationId: getAgentStatus
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Status file content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string

  /api/agents/{name}/inbox:
    get:
      tags: [Agents]
      summary: Get agent inbox (unread + processed)
      operationId: getAgentInbox
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Inbox messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxMessage"
                  processed:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxMessage"

    post:
      tags: [Agents]
      summary: Post to agent inbox (alias for /message)
      operationId: postAgentInbox
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message delivered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"

  /api/agents/{name}/activity:
    get:
      tags: [Agents]
      summary: Get agent cycle activity
      operationId: getAgentActivity
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Cycle activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  cycles:
                    type: array
                    items:
                      type: object

  /api/agents/{name}/persona:
    get:
      tags: [Agents]
      summary: Get agent persona.md content
      operationId: getAgentPersona
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Persona file content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string

  /api/agents/{name}/lastcontext:
    get:
      tags: [Agents]
      summary: Get agent last_context.md
      operationId: getAgentLastContext
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Last context content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string

  # ---------- Tasks ----------
  /api/tasks:
    get:
      tags: [Tasks]
      summary: List all tasks
      operationId: listTasks
      parameters:
        - name: assignee
          in: query
          required: false
          description: Filter by assignee name (case-insensitive)
          schema:
            type: string
          example: bob
        - name: status
          in: query
          required: false
          description: Filter by task status (case-insensitive)
          schema:
            type: string
            enum: [open, in_progress, blocked, in_review, done, cancelled]
          example: open
      responses:
        "200":
          description: Array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
              example:
                - id: "1"
                  title: "Architecture Review"
                  description: "Review system architecture"
                  priority: high
                  assignee: alice
                  status: in_progress
                  created: "2026-03-29"
                  updated: "2026-03-29"

    post:
      tags: [Tasks]
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
            example:
              title: "Implement rate limiting"
              description: "Add per-IP rate limiting to all write endpoints"
              priority: high
              assignee: mia
      responses:
        "201":
          description: Task created — returns full task object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
              example:
                id: 12
                title: "Implement rate limiting"
                description: "Add per-IP rate limiting to all write endpoints"
                priority: high
                assignee: mia
                status: open
                created: "2026-03-29"
                updated: "2026-03-29"
        "400":
          description: Bad request — missing title, whitespace-only title, or invalid priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingTitle:
                  value:
                    error: "title is required"
                invalidPriority:
                  value:
                    error: "priority must be one of: low, medium, high, critical"

  /api/tasks/archive:
    get:
      tags: [Tasks]
      summary: List archived (done) tasks
      operationId: listArchivedTasks
      responses:
        "200":
          description: Archived tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

    post:
      tags: [Tasks]
      summary: Archive all done tasks from the active board
      operationId: archiveDoneTasks
      responses:
        "200":
          description: Archive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  archived:
                    type: integer
                    description: Number of tasks archived

  /api/tasks/{id}:
    patch:
      tags: [Tasks]
      summary: Update a task
      operationId: updateTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
            example:
              status: done
      responses:
        "200":
          description: Task updated — returns full updated task object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
              example:
                id: 3
                title: "QA Review"
                description: "Run test suites"
                priority: high
                assignee: tina
                status: done
                created: "2026-03-29"
                updated: "2026-03-29"
        "400":
          description: Invalid status or priority value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidStatus:
                  value:
                    error: "status must be one of: open, in_progress, blocked, in_review, done, cancelled"
                invalidPriority:
                  value:
                    error: "priority must be one of: low, medium, high, critical"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Tasks]
      summary: Delete a task
      operationId: deleteTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Task deleted — returns the removed task
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{id}/claim:
    post:
      tags: [Tasks]
      summary: Atomically claim a task (set to in_progress)
      description: >
        Atomically assigns a task to the requesting agent using a file lock.
        Returns 409 if already claimed by another agent or already done.
        Safe for concurrent use.
      operationId: claimTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 23
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent]
              properties:
                agent:
                  type: string
                  example: mia
      responses:
        "200":
          description: Task claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
                  status:
                    type: string
                    example: in_progress
                  assignee:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Task already claimed or done
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "task already claimed by bob"
                  claimed_by:
                    type: string
        "503":
          description: Lock timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------- Mode ----------
  /api/mode:
    get:
      tags: [Configuration]
      summary: Get current company operating mode
      operationId: getMode
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [plan, normal, crazy]
                    example: normal
                  raw:
                    type: string
    post:
      tags: [Configuration]
      summary: Switch company operating mode
      operationId: setMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [plan, normal, crazy]
                who:
                  type: string
                  example: ceo
                reason:
                  type: string
                  example: "Plans ready, go fast"
      responses:
        "200":
          description: Mode switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  output:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------- Cost & Stats ----------
  /api/cost:
    get:
      tags: [Stats]
      summary: Today's token spend and 7-day totals per agent
      operationId: getCost
      responses:
        "200":
          description: Cost summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  today_usd:
                    type: number
                    example: 0.42
                  today_cycles:
                    type: integer
                    example: 15
                  total_7d_usd:
                    type: number
                    example: 3.21
                  total_7d_cycles:
                    type: integer
                    example: 120
                  per_agent:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        today_usd:
                          type: number
                        today_cycles:
                          type: integer

  # ---------- Metrics ----------
  /api/metrics:
    get:
      tags: [Stats]
      summary: System-wide metrics (tasks, agents, cost, HTTP)
      operationId: getMetrics
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  timestamp:
                    type: string
                    format: date-time
                  tasks:
                    type: object
                    properties:
                      total:
                        type: integer
                      by_status:
                        type: object
                        additionalProperties:
                          type: integer
                      by_priority:
                        type: object
                        additionalProperties:
                          type: integer
                      by_assignee:
                        type: object
                        additionalProperties:
                          type: integer
                      completion_rate_pct:
                        type: integer
                  agents:
                    type: object
                    properties:
                      total:
                        type: integer
                      running:
                        type: integer
                      idle:
                        type: integer
                      stale:
                        type: integer
                      health:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            status:
                              type: string
                            heartbeat_age_ms:
                              type: integer
                              nullable: true
                  cost_7d:
                    type: object
                    properties:
                      total_usd:
                        type: number
                      total_cycles:
                        type: integer
                      avg_cost_per_cycle_usd:
                        type: number
                      per_agent:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            cost_usd:
                              type: number
                            cycles:
                              type: integer
                  http:
                    type: object
                    description: HTTP metrics from Bob's middleware
                    additionalProperties: true

  # ---------- Announcements ----------
  /api/announcements:
    get:
      tags: [Announcements]
      summary: List all announcements (newest first)
      operationId: listAnnouncements
      responses:
        "200":
          description: Announcements array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

    post:
      tags: [Announcements]
      summary: Post an announcement
      operationId: createAnnouncement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateAnnouncementByMessage"
                - $ref: "#/components/schemas/CreateAnnouncementByTitleBody"
            examples:
              byMessage:
                summary: Post raw markdown
                value:
                  message: "# Site Maintenance\n\nDowntime scheduled for 2026-04-01 02:00 UTC."
              byTitleBody:
                summary: Structured announcement
                value:
                  title: "Site Maintenance"
                  body: "Downtime scheduled for 2026-04-01 02:00 UTC."
                  from: "alice"
      responses:
        "200":
          description: Announcement posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/announce:
    post:
      tags: [Announcements]
      summary: Post an announcement (alias for POST /api/announcements)
      operationId: createAnnouncementAlias
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementByMessage"
      responses:
        "200":
          description: Announcement posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"

  # ---------- Team Channel ----------
  /api/team-channel:
    get:
      tags: [Team Channel]
      summary: List team channel messages (newest first)
      operationId: listTeamChannel
      responses:
        "200":
          description: Team channel messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelMessage"

    post:
      tags: [Team Channel]
      summary: Post to team channel
      operationId: postTeamChannel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              message: "Great work on the API tests everyone!"
              from: "ceo"
      responses:
        "200":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------- Communication ----------
  /api/broadcast:
    post:
      tags: [Communication]
      summary: Broadcast a message to all agent inboxes
      operationId: broadcast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              message: "All hands: switching to crazy mode in 10 minutes"
              from: "ceo"
      responses:
        "200":
          description: Broadcast result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agents:
                    type: integer
                    description: Number of agents messaged
                  filename:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/ceo-inbox:
    get:
      tags: [Communication]
      summary: List CEO inbox messages
      operationId: getCeoInbox
      responses:
        "200":
          description: CEO inbox
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: array
                    items:
                      $ref: "#/components/schemas/CeoInboxMessage"
                  processed:
                    type: array
                    items:
                      $ref: "#/components/schemas/CeoInboxMessage"

  /api/ceo-inbox/{filename}/process:
    post:
      tags: [Communication]
      summary: Mark a CEO inbox message as processed
      operationId: processCeoInboxMessage
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: "2026_03_29_22_04_10_from_bob.md"
      responses:
        "200":
          description: Message moved to processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---------- Messages ----------
  /api/messages/{agent}:
    post:
      tags: [Messaging]
      summary: Send a direct message to an agent's inbox
      description: >
        Writes a message file to the target agent's `chat_inbox/` directory.
        The `from` field is sanitized (alphanumeric/underscore/hyphen only, max 50 chars).
        This is the `backend/api.js` implementation of agent messaging.
      operationId: sendAgentMessage
      parameters:
        - name: agent
          in: path
          required: true
          description: Target agent name
          schema:
            type: string
            example: alice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Message body (written as-is to the inbox file)
                  example: "Please review the latest API changes."
                from:
                  type: string
                  description: Sender identifier (defaults to "api" if omitted)
                  example: mia
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                required: [ok, file]
                properties:
                  ok:
                    type: boolean
                    example: true
                  file:
                    type: string
                    description: Filename written to the agent's inbox
                    example: "2026_03_30_07_30_00_from_mia.md"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Search ----------
  /api/search:
    get:
      tags: [Search]
      summary: Search agent status and todo files
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
          example: charlie
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                query: charlie
                results:
                  - agent: charlie
                    file: status.md
                    matches:
                      - "## Current Task"
                      - "Build frontend components for charlie"
        "400":
          $ref: "#/components/responses/BadRequest"

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  parameters:
    AgentName:
      name: name
      in: path
      required: true
      description: Agent name (alphanumeric, hyphens, underscores only)
      schema:
        type: string
        pattern: "^[a-zA-Z0-9_-]+$"
      examples:
        alice:
          value: alice
        bob:
          value: bob

  responses:
    BadRequest:
      description: Bad request — missing or invalid parameter
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "missing title"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "agent not found"

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              retryAfterMs:
                type: integer

  schemas:

    # --- Shared ---
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SendMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 5000
          description: Message content (markdown supported)
        from:
          type: string
          maxLength: 64
          description: Sender identifier
          default: dashboard

    SendMessageResponse:
      type: object
      required: [ok, filename]
      properties:
        ok:
          type: boolean
        filename:
          type: string
          description: Filename written to inbox

    # --- Health ---
    HealthResponseBackend:
      type: object
      description: Health response from backend/api.js
      required: [status, uptime_ms]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        uptime_ms:
          type: integer
          description: Server uptime in milliseconds since process start
          example: 3600000

    HealthResponse:
      type: object
      required: [uptime, memory]
      properties:
        uptime:
          type: integer
          description: Server uptime in seconds
        memory:
          type: object
          properties:
            rss:
              type: integer
              description: Resident set size in bytes
            heapUsed:
              type: integer
            heapTotal:
              type: integer
        activeAgents:
          type: integer
        sseClients:
          type: integer

    ConfigResponse:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
        directory:
          type: string

    DashboardResponse:
      type: object
      required: [agents, tasks, mode]
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AgentSummary"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        mode:
          type: string
          enum: [plan, normal, crazy]
        activeCount:
          type: integer

    # --- Agents ---
    AgentSummary:
      type: object
      description: |
        Agent summary from GET /api/agents (server.js).
        server.js returns a plain array. backend/api.js wraps it in { agents: [...] }.
      required: [name, alive, unread_messages]
      properties:
        name:
          type: string
        role:
          type: string
          nullable: true
          description: Agent role from team directory
        status:
          type: string
          enum: [running, idle, stopped, error, unknown]
        current_task:
          type: string
          nullable: true
          description: Parsed from status.md current task section or heartbeat.md
        cycles:
          type: integer
          nullable: true
          description: Cycle count parsed from status.md
        last_update:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of most recent raw log file
        lastSeenSecs:
          type: integer
          nullable: true
          description: Seconds since last raw log activity
        heartbeat_age_ms:
          type: integer
          nullable: true
          description: Milliseconds since heartbeat.md was last modified
        auth_error:
          type: boolean
          description: True if agent's last_context.md indicates an auth/login failure
        alive:
          type: boolean
          description: True if heartbeat.md updated within last 5 minutes, or status is "running"
        unread_messages:
          type: integer
          description: Count of unread inbox files (filenames not prefixed with "read_")

    AgentDetail:
      type: object
      required: [name, alive, inbox]
      description: |
        Agent detail returned by GET /api/agents/:name (backend/api.js).
        The inbox field contains metadata only — no message content is exposed
        to prevent unauthenticated data exposure (QI-003).
      properties:
        name:
          type: string
        alive:
          type: boolean
          description: True if heartbeat was updated within the last 5 minutes
        heartbeat_at:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of last heartbeat file modification
        statusMd:
          type: string
          nullable: true
          description: Raw content of status.md (also present as status_md)
        status_md:
          type: string
          nullable: true
          description: Alias for statusMd
        inbox:
          type: array
          description: Inbox file metadata — filenames and read status only (no content)
          items:
            $ref: "#/components/schemas/InboxMessageMeta"

    InboxMessageMeta:
      type: object
      description: Inbox message metadata (QI-003 — content not exposed)
      properties:
        file:
          type: string
          description: Filename in the chat_inbox directory
          example: "2026_03_29_22_00_00_from_ceo.md"
        read:
          type: boolean
          description: True if filename starts with "read_"

    InboxMessage:
      type: object
      description: Full inbox message (server.js /api/agents/:name/inbox endpoint)
      properties:
        filename:
          type: string
        content:
          type: string
        unread:
          type: boolean

    LogEntry:
      type: object
      properties:
        type:
          type: string
          enum: [info, error, warning, cycle, tool, cost]
        content:
          type: string
        timestamp:
          type: string
          nullable: true

    # --- Tasks ---
    Task:
      type: object
      properties:
        id:
          type: string
          description: Task ID (numeric string from markdown table)
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        assignee:
          type: string
        status:
          type: string
          enum: [open, in_progress, blocked, in_review, done, cancelled]
        created:
          type: string
          format: date
        updated:
          type: string
          format: date

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        priority:
          type: string
          enum: [low, medium, high, critical]
          default: medium
        assignee:
          type: string
          maxLength: 50

    UpdateTaskRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        assignee:
          type: string
        status:
          type: string
          enum: [open, in_progress, blocked, in_review, done, cancelled]

    # --- Announcements ---
    Announcement:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        title:
          type: string
        body:
          type: string
        from:
          type: string
          nullable: true
        date:
          type: string
          format: date
          nullable: true

    CreateAnnouncementByMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Full announcement as markdown

    CreateAnnouncementByTitleBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
        body:
          type: string
        from:
          type: string

    # --- Team Channel ---
    ChannelMessage:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        date:
          type: string
          format: date
          nullable: true

    # --- CEO Inbox ---
    CeoInboxMessage:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        from:
          type: string

    # --- Search ---
    SearchResponse:
      type: object
      required: [query, results]
      properties:
        query:
          type: string
        results:
          type: array
          items:
            type: object
            properties:
              agent:
                type: string
              file:
                type: string
              matches:
                type: array
                items:
                  type: string
