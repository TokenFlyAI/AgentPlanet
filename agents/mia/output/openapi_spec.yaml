openapi: 3.0.3
info:
  title: Tokenfly Agent Lab — server.js API
  version: "1.4"
  description: |
    Complete REST API for the Tokenfly Agent Lab dashboard server (server.js).
    All endpoints are served on port 3199 by default.

    Rate limiting is enforced by Bob's middleware on /api/* routes.
    CORS is enabled on all /api/* routes (Access-Control-Allow-Origin: *).

servers:
  - url: http://localhost:3199
    description: Local dashboard server

tags:
  - name: Core
    description: Health, config, and dashboard
  - name: Agents
    description: Agent status, lifecycle, and messaging
  - name: Agent Data
    description: Agent sub-resources (inbox, cycles, output, persona)
  - name: Tasks
    description: Task board management
  - name: Communication
    description: Team channel, announcements, broadcast
  - name: CEO
    description: CEO inbox and quick command routing
  - name: Organization
    description: Org chart, modes, SOPs
  - name: Stats
    description: Cost, metrics, and monitoring
  - name: Knowledge
    description: Research, knowledge base
  - name: Streaming
    description: Server-Sent Events

paths:

  # =========================================================================
  # CORE
  # =========================================================================

  /api/health:
    get:
      tags: [Core]
      summary: Server health check
      description: Returns uptime, memory stats, active agent count, and SSE client count.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                uptime_ms: 123456789
                uptime: 123456
                memory:
                  rss: 52428800
                  heapUsed: 30000000
                  heapTotal: 45000000
                activeAgents: 5
                sseClients: 2

  /api/config:
    get:
      tags: [Core]
      summary: Company configuration
      description: Returns parsed company name, mode, and raw company.md content.
      responses:
        "200":
          description: Config object
          content:
            application/json:
              schema:
                type: object
                properties:
                  company_name:
                    type: string
                  mode:
                    type: string
                  company_md:
                    type: string

  /api/dashboard:
    get:
      tags: [Core]
      summary: Combined dashboard snapshot
      description: Returns all agents, tasks, and current company mode in one call.
      responses:
        "200":
          description: Dashboard snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
                  mode:
                    type: string

  /api/search:
    get:
      tags: [Core]
      summary: Search across agents and tasks
      description: Full-text search over agent status, task titles, and task descriptions.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentSummary"
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"

  # =========================================================================
  # AGENTS — list and detail
  # =========================================================================

  /api/agents:
    get:
      tags: [Agents]
      summary: List all agents
      description: Returns array of AgentSummary objects for all known agents.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"

  /api/agents/{name}:
    get:
      tags: [Agents]
      summary: Get agent detail
      description: Returns full agent detail including status file content, inbox metadata, persona, and heartbeat info.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # AGENTS — lifecycle
  # =========================================================================

  /api/agents/{name}/start:
    post:
      tags: [Agents]
      summary: Start an agent
      description: Spawns the agent's run loop via run_subset.sh.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Start result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Agent already running

  /api/agents/{name}/stop:
    post:
      tags: [Agents]
      summary: Stop an agent
      description: Sends SIGTERM to the agent process.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/ping:
    get:
      tags: [Agents]
      summary: Ping an agent
      description: Returns the agent's current heartbeat timestamp and alive status.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Ping result
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  alive:
                    type: boolean
                  heartbeat_at:
                    type: string
                    nullable: true
                  heartbeat_age_ms:
                    type: integer
                    nullable: true

  /api/agents/{name}/message:
    post:
      tags: [Agents]
      summary: Send message to agent inbox
      description: Writes a message file to the agent's chat_inbox/ directory.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: dashboard
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/start-all:
    post:
      tags: [Agents]
      summary: Start all agents
      description: Launches all 20 agents via run_all.sh.
      responses:
        "200":
          description: Start result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/stop-all:
    post:
      tags: [Agents]
      summary: Stop all agents
      description: Sends SIGTERM to all running agent processes.
      responses:
        "200":
          description: Stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/smart-start:
    post:
      tags: [Agents]
      summary: Smart start agents
      description: |
        Only starts agents that have actual work: assigned open tasks OR unread inbox messages.
        Token-conservative — avoids spinning up idle agents.
      responses:
        "200":
          description: List of agents started
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  started:
                    type: array
                    items:
                      type: string
                  skipped:
                    type: array
                    items:
                      type: string

  /api/agents/watchdog:
    post:
      tags: [Agents]
      summary: Restart stuck agents
      description: Detects agents with stale heartbeats (>15 min) and restarts them.
      responses:
        "200":
          description: Watchdog result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  restarted:
                    type: array
                    items:
                      type: string
                  checked:
                    type: integer

  /api/watchdog-log:
    get:
      tags: [Agents]
      summary: Get watchdog log
      description: Returns recent watchdog restart history.
      responses:
        "200":
          description: Watchdog log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  # =========================================================================
  # AGENT DATA — sub-resources
  # =========================================================================

  /api/agents/{name}/log:
    get:
      tags: [Agent Data]
      summary: Get agent runtime log
      description: Returns the agent's current runtime log file content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: tail
          in: query
          schema:
            type: integer
          description: Number of lines from end to return (default: all)
      responses:
        "200":
          description: Log content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/log/stream:
    get:
      tags: [Streaming]
      summary: Live-tail agent log (SSE)
      description: |
        Server-Sent Events stream that tails the agent's runtime log in real time.
        Uses fs.watch + 1s polling fallback. Sends `event: refresh` on new data.
        Sends `: keepalive` every 15 seconds.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/agents/{name}/inbox:
    get:
      tags: [Agent Data]
      summary: Get agent inbox
      description: Returns inbox message metadata (filenames, read status). Does NOT return full content for security.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Inbox metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InboxMessageMeta"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Agent Data]
      summary: Post to agent inbox
      description: Writes a new message file to the agent's chat_inbox/.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: dashboard
      responses:
        "200":
          description: Message written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/{name}/activity:
    get:
      tags: [Agent Data]
      summary: Get agent activity log
      description: Returns the agent's activity.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Activity content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/status:
    get:
      tags: [Agent Data]
      summary: Get agent status file
      description: Returns the agent's status.md content (agent memory).
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Status content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/todo:
    get:
      tags: [Agent Data]
      summary: Get agent todo list
      description: Returns the agent's todo.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Todo content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string

  /api/agents/{name}/persona:
    get:
      tags: [Agent Data]
      summary: Get agent persona
      description: Returns the agent's persona.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Persona content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
    patch:
      tags: [Agent Data]
      summary: Update agent persona
      description: Appends an evolution entry to the agent's persona evolution log.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entry]
              properties:
                entry:
                  type: string
                  description: The evolution note to append
      responses:
        "200":
          description: Persona updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/{name}/persona/note:
    post:
      tags: [Agent Data]
      summary: Append persona note
      description: Appends a note to the agent's persona evolution log file.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Note appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/agents/{name}/lastcontext:
    get:
      tags: [Agent Data]
      summary: Get agent last context
      description: Returns the agent's last_context.md content.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Last context content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  content:
                    type: string

  /api/agents/{name}/cycles:
    get:
      tags: [Agent Data]
      summary: List agent cycle history
      description: |
        Returns today's cycle summaries for an agent — cost, turns, duration, action preview.
        Results are newest-first.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Cycle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  date:
                    type: string
                    example: "2026_03_30"
                  cycles:
                    type: array
                    items:
                      $ref: "#/components/schemas/CycleSummary"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/cycles/{n}:
    get:
      tags: [Agent Data]
      summary: Get full cycle output
      description: Returns the complete log output for cycle N of the agent.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: n
          in: path
          required: true
          schema:
            type: integer
          description: Cycle number (1-based)
      responses:
        "200":
          description: Full cycle output
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  cycle:
                    type: integer
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/output:
    get:
      tags: [Agent Data]
      summary: List agent output files
      description: Returns list of files in the agent's output/ directory.
      parameters:
        - $ref: "#/components/parameters/AgentName"
      responses:
        "200":
          description: Output file list
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        file:
                          type: string
                        size:
                          type: integer
                        mtime:
                          type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/agents/{name}/output/{file}:
    get:
      tags: [Agent Data]
      summary: Read agent output file
      description: Returns the content of a specific file from the agent's output/ directory.
      parameters:
        - $ref: "#/components/parameters/AgentName"
        - name: file
          in: path
          required: true
          schema:
            type: string
          description: Filename within the output directory
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  file:
                    type: string
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # TASKS
  # =========================================================================

  /api/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      description: Returns all tasks from the task board, optionally filtered.
      parameters:
        - name: assignee
          in: query
          schema:
            type: string
          description: Filter by assignee name
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
          description: Filter by status
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/TaskPriority"
          description: Filter by priority
        - name: q
          in: query
          schema:
            type: string
          description: Full-text search over title and description
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Create a task
      description: Creates a new task row on the task board.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Validation error (empty title or invalid priority)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tasks/archive:
    get:
      tags: [Tasks]
      summary: Get archived tasks
      description: Returns all done tasks from the task board archive.
      responses:
        "200":
          description: Archived task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      tags: [Tasks]
      summary: Archive done tasks
      description: Moves all done tasks from the active board to the archive file.
      responses:
        "200":
          description: Archive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  archived:
                    type: integer
                    description: Number of tasks archived

  /api/tasks/{id}:
    patch:
      tags: [Tasks]
      summary: Update a task
      description: |
        Updates task fields (status, priority, assignee, title, description, notes).
        Returns the full updated task object.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/OkResponse"
                  - $ref: "#/components/schemas/Task"
        "400":
          description: Invalid status or priority
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tasks]
      summary: Delete a task
      description: Permanently removes a task row from the task board.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/tasks/{id}/claim:
    post:
      tags: [Tasks]
      summary: Atomically claim a task
      description: |
        Sets task status to in_progress and assignee to the requesting agent.
        Uses file locking to prevent race conditions between parallel agents.
        Returns 409 if task is already claimed by another agent or is done.
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent]
              properties:
                agent:
                  type: string
                  description: Agent name claiming the task
      responses:
        "200":
          description: Task claimed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer
                  status:
                    type: string
                    example: in_progress
                  assignee:
                    type: string
        "400":
          description: Missing agent name
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Task already claimed or done
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: string
                  claimed_by:
                    type: string
                    nullable: true

  /api/tasks/{id}/result:
    get:
      tags: [Tasks]
      summary: Get task result
      description: |
        Looks for a task result file in this order:
        1. public/task_outputs/task-{id}-*.md
        2. Assignee's output/ folder (exact match on task id)
        3. Assignee's latest output file (best effort)
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task result
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  source:
                    type: string
                    enum: [task_outputs, agent_output, agent_output_latest]
                  file:
                    type: string
                  assignee:
                    type: string
                    nullable: true
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Tasks]
      summary: Write task result file
      description: Writes a result file to public/task_outputs/task-{id}-result.md (or custom filename).
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                filename:
                  type: string
                  description: Custom filename (sanitized). Default: task-{id}-result.md
      responses:
        "200":
          description: Result file written
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  task_id:
                    type: string
                  file:
                    type: string

  # =========================================================================
  # COMMUNICATION
  # =========================================================================

  /api/team-channel:
    get:
      tags: [Communication]
      summary: Get team channel messages
      description: Returns all messages from public/team_channel/, newest first.
      responses:
        "200":
          description: Team channel messages
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    filename:
                      type: string
                    content:
                      type: string
                    date:
                      type: string
    post:
      tags: [Communication]
      summary: Post to team channel
      description: Writes a message to public/team_channel/.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: ceo
      responses:
        "200":
          description: Message posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  filename:
                    type: string

  /api/announcements:
    get:
      tags: [Communication]
      summary: List announcements
      description: Returns all announcements from public/announcements/, newest first.
      responses:
        "200":
          description: Announcement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      tags: [Communication]
      summary: Post announcement
      description: |
        Creates a new announcement file in public/announcements/.
        Accepts `{message}` (raw markdown) or `{title, body, from}` (structured).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [message]
                  properties:
                    message:
                      type: string
                - type: object
                  properties:
                    title:
                      type: string
                    body:
                      type: string
                    from:
                      type: string
      responses:
        "200":
          description: Announcement created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  filename:
                    type: string

  /api/announce:
    post:
      tags: [Communication]
      summary: Post announcement (alias)
      description: Alias for POST /api/announcements — same behavior.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                title:
                  type: string
                body:
                  type: string
                from:
                  type: string
      responses:
        "200":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /api/broadcast:
    post:
      tags: [Communication]
      summary: Broadcast to all agents
      description: Writes a message to every agent's chat_inbox/ directory simultaneously.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
                  default: dashboard
      responses:
        "200":
          description: Broadcast result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  agents:
                    type: integer
                    description: Number of agents messaged
                  filename:
                    type: string

  # =========================================================================
  # CEO
  # =========================================================================

  /api/ceo-inbox:
    get:
      tags: [CEO]
      summary: Get CEO inbox
      description: Returns unread and recently processed CEO inbox messages.
      responses:
        "200":
          description: CEO inbox
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxMessage"
                  processed:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxMessage"
                    description: Last 20 processed messages

  /api/ceo-inbox/{filename}/read:
    post:
      tags: [CEO]
      summary: Mark CEO message as read
      description: Moves the message file to ceo_inbox/processed/.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Message filename (e.g. 2026_03_29_from_bob.md)
      responses:
        "200":
          description: Message marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid filename

  /api/ceo/command:
    post:
      tags: [CEO]
      summary: CEO quick command
      description: |
        Smart routing for CEO commands:
        - `@agentname <message>` → DM to that agent's inbox
        - `task: <title>` → Create unassigned medium-priority task
        - `/mode <name>` → Switch company mode (plan/normal/crazy/autonomous)
        - anything else → Routes to alice's inbox as CEO priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  examples:
                    dm:
                      value: "@bob please fix the rate limiting bug"
                    task:
                      value: "task: Implement WebSocket real-time updates"
                    mode:
                      value: "/mode crazy"
                    default:
                      value: "What is the status of the login feature?"
      responses:
        "200":
          description: Command result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  action:
                    type: string
                    enum: [dm, task_created, mode_switched, routed_to_alice]
                  agent:
                    type: string
                    nullable: true
                  filename:
                    type: string
                    nullable: true
                  id:
                    type: integer
                    nullable: true
                  mode:
                    type: string
                    nullable: true
        "201":
          description: Task created via `task:` prefix
        "400":
          description: Empty command

  # =========================================================================
  # ORGANIZATION
  # =========================================================================

  /api/org:
    get:
      tags: [Organization]
      summary: Get org chart
      description: Returns the parsed org chart hierarchy from company.md.
      responses:
        "200":
          description: Org chart
          content:
            application/json:
              schema:
                type: object

  /api/mode:
    get:
      tags: [Organization]
      summary: Get company mode
      description: Returns the current operating mode (plan/normal/crazy).
      responses:
        "200":
          description: Current mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  mode:
                    type: string
                    enum: [plan, normal, crazy, autonomous]
                  raw:
                    type: string
                    description: Raw markdown content of company_mode.md
    post:
      tags: [Organization]
      summary: Switch company mode
      description: Switches the company operating mode by executing switch_mode.sh.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, who, reason]
              properties:
                mode:
                  type: string
                  enum: [plan, normal, crazy]
                who:
                  type: string
                  description: Who is switching the mode
                reason:
                  type: string
                  description: Reason for mode switch
      responses:
        "200":
          description: Mode switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  output:
                    type: string
        "400":
          description: Invalid mode or missing fields

  /api/sops:
    get:
      tags: [Organization]
      summary: List SOPs
      description: Returns all SOP markdown files from public/sops/.
      responses:
        "200":
          description: SOP list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    filename:
                      type: string
                    content:
                      type: string

  /api/ops:
    get:
      tags: [Organization]
      summary: List shell scripts
      description: Returns names of all .sh scripts in the root directory.
      responses:
        "200":
          description: Script list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # =========================================================================
  # STATS & MONITORING
  # =========================================================================

  /api/cost:
    get:
      tags: [Stats]
      summary: Get token cost summary
      description: Returns today's and 7-day token cost totals per agent and system-wide.
      responses:
        "200":
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostResponse"

  /api/stats:
    get:
      tags: [Stats]
      summary: Get 7-day cost stats
      description: Returns 7-day cost and cycle stats per agent with totals for chart rendering.
      responses:
        "200":
          description: Stats response
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        agent:
                          type: string
                        totalCost:
                          type: number
                        cycles:
                          type: integer
                  totals:
                    type: object
                    properties:
                      totalCost:
                        type: number
                      totalCycles:
                        type: integer
                  total_cycles:
                    type: integer
                  total_cost:
                    type: number
                  cycles_per_agent:
                    type: object
                    additionalProperties:
                      type: integer
                  cost_per_agent:
                    type: object
                    additionalProperties:
                      type: number

  /api/digest:
    get:
      tags: [Stats]
      summary: Get activity digest
      description: Returns per-agent cycle activity summary from today's log files.
      responses:
        "200":
          description: Digest array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    agent:
                      type: string
                    completedCycles:
                      type: integer
                    activeCycle:
                      type: boolean
                    cycles:
                      type: array
                      items:
                        type: object

  /api/metrics:
    get:
      tags: [Stats]
      summary: System-wide metrics
      description: |
        Returns comprehensive system metrics: task stats (by status/priority/assignee),
        agent health, 7-day cost/cycle data, and HTTP request metrics from Bob's middleware.
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsResponse"

  /api/metrics/agents:
    get:
      tags: [Stats]
      summary: Agent metrics sub-route (Bob)
      description: Handled by Bob's agent_metrics_api module. Returns per-agent metric details.
      responses:
        "200":
          description: Agent metrics

  /api/metrics/tasks:
    get:
      tags: [Stats]
      summary: Task metrics sub-route (Bob)
      description: Handled by Bob's agent_metrics_api module. Returns task metric details.
      responses:
        "200":
          description: Task metrics

  /api/metrics/health:
    get:
      tags: [Stats]
      summary: Health metrics sub-route (Bob)
      description: Handled by Bob's agent_metrics_api module. Returns system health details.
      responses:
        "200":
          description: Health metrics

  /api/code-output:
    get:
      tags: [Stats]
      summary: List all agent output files
      description: Returns a flat list of all output files across all agents.
      responses:
        "200":
          description: All output files
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    agent:
                      type: string
                    file:
                      type: string
                    size:
                      type: integer
                    mtime:
                      type: string

  # =========================================================================
  # KNOWLEDGE & RESEARCH
  # =========================================================================

  /api/research:
    get:
      tags: [Knowledge]
      summary: List research files
      description: Returns all files from public/plans/ and public/reports/.
      responses:
        "200":
          description: Research file list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    file:
                      type: string
                    type:
                      type: string
                      enum: [plan, report]
                    dir:
                      type: string

  /api/research/{path}:
    get:
      tags: [Knowledge]
      summary: Read research file
      description: Returns content of a file from public/plans/ or public/reports/.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Filename (searched in plans/ then reports/)
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: string
                  dir:
                    type: string
                  content:
                    type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/knowledge:
    get:
      tags: [Knowledge]
      summary: List knowledge base files
      description: Returns all files recursively from public/knowledge/.
      responses:
        "200":
          description: Knowledge file list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/knowledge/{path}:
    get:
      tags: [Knowledge]
      summary: Read knowledge base file
      description: Returns content of a file from public/knowledge/. Path traversal is blocked.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: Relative path within public/knowledge/
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  content:
                    type: string
        "400":
          description: Invalid path (path traversal attempt)
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # CONSENSUS
  # =========================================================================

  /api/consensus:
    get:
      tags: [Communication]
      summary: Get consensus board
      description: Returns all entries from the social consensus board (public/consensus.md).
      responses:
        "200":
          description: Consensus board
          content:
            application/json:
              schema:
                type: object
                properties:
                  raw:
                    type: string
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConsensusEntry"

  /api/consensus/entry:
    post:
      tags: [Communication]
      summary: Add consensus entry
      description: Appends a new entry to the consensus board.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  description: Entry type (e.g. agreement, decision, norm)
                content:
                  type: string
                author:
                  type: string
                  default: agent
                section:
                  type: string
                  default: Evolving Relationships
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: integer

  # =========================================================================
  # STREAMING
  # =========================================================================

  /api/events:
    get:
      tags: [Streaming]
      summary: Global SSE event stream
      description: |
        Server-Sent Events stream for real-time dashboard updates.
        Sends `event: refresh\ndata: {}\n\n` whenever any agent file changes.
        Sends `: keepalive` every 15 seconds.
        Dashboard clients use this to auto-refresh without polling.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  # =========================================================================
  # MESSAGING (Bob's SQLite message bus)
  # =========================================================================

  /api/messages/{agent}:
    post:
      tags: [Communication]
      summary: Send message via message bus
      description: |
        Sends a message to an agent via Bob's SQLite message bus.
        Handled by Bob's backend-api-module.
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
          description: Target agent name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                from:
                  type: string
      responses:
        "200":
          description: Message queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

# ===========================================================================
# COMPONENTS
# ===========================================================================

components:
  parameters:
    AgentName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Agent name (alice, bob, charlie, etc.)

    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Task ID

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        uptime_ms:
          type: integer
        uptime:
          type: integer
          description: Uptime in seconds
        memory:
          type: object
          properties:
            rss:
              type: integer
            heapUsed:
              type: integer
            heapTotal:
              type: integer
        activeAgents:
          type: integer
        sseClients:
          type: integer

    AgentSummary:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [running, idle, stopped, unknown]
        role:
          type: string
        alive:
          type: boolean
        heartbeat_at:
          type: string
          nullable: true
          description: ISO timestamp of last heartbeat file write
        heartbeat_age_ms:
          type: integer
          nullable: true
        unread_messages:
          type: integer
        cycles:
          type: integer
          description: Number of cycles run today
        last_update:
          type: string
          nullable: true
        lastSeenSecs:
          type: integer
          nullable: true
        auth_error:
          type: string
          nullable: true
          description: Auth error message if agent failed auth (e.g. rate limit)

    AgentDetail:
      allOf:
        - $ref: "#/components/schemas/AgentSummary"
        - type: object
          properties:
            status_content:
              type: string
              description: Raw content of status.md (agent memory)
            persona_content:
              type: string
              nullable: true
            inbox:
              type: array
              items:
                $ref: "#/components/schemas/InboxMessageMeta"
            last_context:
              type: string
              nullable: true

    InboxMessageMeta:
      type: object
      description: Inbox message metadata only — content not returned for security (QI-003)
      properties:
        file:
          type: string
          description: Filename of the inbox message
        read:
          type: boolean
          description: Whether the message has been moved to processed/

    InboxMessage:
      type: object
      properties:
        filename:
          type: string
        from:
          type: string
        timestamp:
          type: string
        content:
          type: string

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        created:
          type: string
          format: date
        updated:
          type: string
          format: date
        notes:
          type: string
          nullable: true
        notesList:
          type: array
          items:
            type: string
          description: notes split on ' ;; ' delimiter

    TaskStatus:
      type: string
      enum: [open, in_progress, blocked, in_review, done, cancelled]

    TaskPriority:
      type: string
      enum: [low, medium, high, critical]

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          description: Task title (non-empty, non-whitespace-only)
        description:
          type: string
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
          default: unassigned
        notes:
          type: string

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee:
          type: string
        notes:
          type: string

    CycleSummary:
      type: object
      properties:
        n:
          type: integer
          description: Cycle number (1-based)
        started:
          type: string
        ended:
          type: string
          nullable: true
        turns:
          type: integer
          nullable: true
        cost_usd:
          type: number
          nullable: true
        duration_s:
          type: number
          nullable: true
        action_count:
          type: integer
        preview:
          type: string
          description: First 3 actions joined by ' | '

    Announcement:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        title:
          type: string
        body:
          type: string
        from:
          type: string
          nullable: true
        date:
          type: string
          nullable: true

    ConsensusEntry:
      type: object
      properties:
        id:
          type: integer
        section:
          type: string
        type:
          type: string
        content:
          type: string
        author:
          type: string
        updated:
          type: string

    CostResponse:
      type: object
      properties:
        today_usd:
          type: number
        today_cycles:
          type: integer
        total_7d_usd:
          type: number
        total_7d_cycles:
          type: integer
        per_agent:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              today_usd:
                type: number
              today_cycles:
                type: integer

    MetricsResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        tasks:
          type: object
          properties:
            total:
              type: integer
            by_status:
              type: object
              additionalProperties:
                type: integer
            by_priority:
              type: object
              additionalProperties:
                type: integer
            by_assignee:
              type: object
              additionalProperties:
                type: integer
            completion_rate_pct:
              type: integer
        agents:
          type: object
          properties:
            total:
              type: integer
            running:
              type: integer
            idle:
              type: integer
            stale:
              type: integer
            health:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                  heartbeat_age_ms:
                    type: integer
                    nullable: true
        cost_7d:
          type: object
          properties:
            total_usd:
              type: number
            total_cycles:
              type: integer
            avg_cost_per_cycle_usd:
              type: number
            per_agent:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  cost_usd:
                    type: number
                  cycles:
                    type: integer
        http:
          type: object
          description: HTTP request metrics from Bob's middleware
